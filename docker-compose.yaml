services:
  redis:
    image: redis:7-alpine
    container_name: rate_limiter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate_limiter_app
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RATE_LIMIT_IP_MAX_REQUESTS=5
      - RATE_LIMIT_IP_BLOCK_DURATION_SECONDS=300
      - RATE_LIMIT_TOKEN_MAX_REQUESTS=10
      - RATE_LIMIT_TOKEN_BLOCK_DURATION_SECONDS=300
    depends_on:
      redis:
        condition: service_healthy
